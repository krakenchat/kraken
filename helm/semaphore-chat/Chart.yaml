apiVersion: v2
name: semaphore-chat
description: A self-hosted voice and text chat application with video calling support
type: application
version: 0.0.1
appVersion: "0.0.1"
keywords:
  - chat
  - voice
  - video
  - communication
  - websocket
  - livekit
home: https://github.com/semaphore-chat/semaphore-chat
sources:
  - https://github.com/semaphore-chat/semaphore-chat
maintainers:
  - name: Semaphore Chat Team
    email: oss@semaphorechat.app
icon: https://raw.githubusercontent.com/semaphore-chat/semaphore-chat/main/logo.png

# Optional dependencies (can be disabled via values.yaml)
dependencies:
  - name: postgresql
    version: "16.4.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.bundled
    tags:
      - database
  - name: redis
    version: "19.6.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.bundled
    tags:
      - cache
