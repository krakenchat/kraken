apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "semaphore-chat.fullname" . }}-backend-config
  labels:
    {{- include "semaphore-chat.backend.labels" . | nindent 4 }}
data:
  # PostgreSQL connection
  DATABASE_URL: {{ include "semaphore-chat.postgresql.uri" . | quote }}

  # Redis connection
  REDIS_HOST: {{ include "semaphore-chat.redis.host" . | quote }}
  REDIS_PORT: {{ include "semaphore-chat.redis.port" . | quote }}

  # LiveKit configuration
  LIVEKIT_URL: {{ .Values.livekit.url | quote }}
  LIVEKIT_API_KEY: {{ .Values.livekit.apiKey | quote }}

  # Skip entrypoint migrations — handled by pre-install/pre-upgrade Job
  SKIP_PRISMA_MIGRATE: "true"

  # Node environment
  NODE_ENV: "production"

  # Reverse proxy trust (Express "trust proxy" setting)
  {{- if .Values.backend.trustProxy }}
  TRUST_PROXY: {{ .Values.backend.trustProxy | quote }}
  {{- end }}

  # File upload configuration
  FILE_UPLOAD_DEST: "/app/uploads"

  {{- if .Values.replayStorage.enabled }}
  # Replay segments storage path
  REPLAY_SEGMENTS_PATH: {{ .Values.replayStorage.mountPath | quote }}
  {{- end }}
