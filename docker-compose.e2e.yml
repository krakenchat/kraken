# Docker Compose configuration for E2E tests
# Uses separate test database to isolate from development data

services:
  # PostgreSQL for E2E tests (separate from dev)
  postgres-test:
    image: postgres:17
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    environment:
      POSTGRES_USER: kraken
      POSTGRES_PASSWORD: kraken
      POSTGRES_DB: kraken_e2e_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kraken"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - e2e-network

  # Redis for E2E tests
  redis-test:
    image: redis:latest
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - e2e-network

  # Backend service for E2E tests
  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: pnpm run start:dev
    ports:
      - "3001:3000"  # Different port to avoid conflicts
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://kraken:kraken@postgres-test:5432/kraken_e2e_test
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - JWT_SECRET=e2e-test-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=e2e-test-refresh-secret-change-in-production
      - SKIP_INVITE_CODE=true  # Allow registration without invite code in tests
      # LiveKit - placeholder values for E2E (not testing voice/video)
      - LIVEKIT_URL=wss://e2e-test.livekit.cloud
      - LIVEKIT_API_KEY=e2e-test-api-key
      - LIVEKIT_API_SECRET=e2e-test-api-secret
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - /app/node_modules
      - /app/backend/node_modules
      - /app/shared/node_modules
    working_dir: /app/backend
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - e2e-network

  # Frontend service for E2E tests
  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    command: pnpm run dev -- --host 0.0.0.0
    ports:
      - "5174:5173"  # Different port to avoid conflicts
    environment:
      - NODE_ENV=test
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/shared/node_modules
      # Override vite config for E2E (proxy to backend-test)
      - ./frontend/vite.config.e2e.ts:/app/frontend/vite.config.ts:ro
      # Mount backend dir as /spec so docker-entrypoint.sh can generate API client
      - ./backend:/spec:ro
    working_dir: /app/frontend
    depends_on:
      - backend-test
    networks:
      - e2e-network

  # Playwright test runner
  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    volumes:
      - ./frontend:/app
      - ./frontend/playwright-report:/app/playwright-report
      - ./frontend/test-results:/app/test-results
    working_dir: /app
    environment:
      - E2E_BASE_URL=http://frontend-test:5173
      - CI=true
    command: npx playwright test --reporter=html
    depends_on:
      - frontend-test
      - backend-test
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge

volumes:
  postgres-test-data:
